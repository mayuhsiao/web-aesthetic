<div class="main-container" [style.background-color]="'var(--color-bg-light)'">
  
  <header class="navbar" [style.background-color]="'var(--color-bg-light)'">
    <div class="logo">
      <span class="logo-text" [style.color]="'var(--color-primary)'">閣美學 STATION SQUARE</span>
    </div>
    <nav class="nav-links">
      <a routerLink="/" [style.color]="'var(--color-text-dark)'">首頁 Home</a>
      <a routerLink="/notices" [style.color]="'var(--color-text-dark)'">公告 Notices</a>
      <a routerLink="/booking" [style.color]="'var(--color-text-dark)'">預約 Booking</a>
      <a routerLink="/maintenance" [style.color]="'var(--color-text-dark)'">報修 Maintenance</a>

    </nav>
  </header>

  <section class="hero-section" [style.background-color]="'var(--color-bg-alt)'">
    <div class="hero-content">
      <h1 [style.color]="'var(--color-primary)'">歡迎來到閣美學</h1>
      <p [style.color]="'var(--color-text-dark)'">您的精緻生活管理平台 STATION SQUARE。</p>
      <button class="cta-btn" [style.background-color]="'var(--color-primary)'" [style.color]="'white'">開始體驗</button>
    </div>
    <img src="/images/c1.jpg" alt="Community Exterior" class="hero-img">
  </section>

  <section class="features-section">
    <h2 [style.color]="'var(--color-primary)'" style="text-align: center;">社區精選服務</h2>
    <div class="features-grid">
      
      <div class="card" [style.border-color]="'var(--color-primary)'">
        <img src="/images/a1.jpg" alt="Notices Icon" class="card-img">
        <h3 [style.color]="'var(--color-text-dark)'">公告通知</h3>
        <p [style.color]="'var(--color-text-dark)'">即時接收社區公告與會議紀錄。</p>
        <button [style.background-color]="'var(--color-primary)'" [style.color]="'white'">查看公告</button>
      </div>
      
      <div class="card" [style.border-color]="'var(--color-primary)'">
         <img src="/images/a2.jpg" alt="Notices Icon" class="card-img">
        <h3 [style.color]="'var(--color-text-dark)'">公設及住戶報修</h3>
        <p [style.color]="'var(--color-text-dark)'">公設及住戶報修。</p>
        <button [style.background-color]="'var(--color-primary)'" [style.color]="'white'">立即預約</button>
      </div>
      
      <div class="card" [style.border-color]="'var(--color-primary)'">
        <img src="/images/a3.jpg" alt="Notices Icon" class="card-img">
        <h3 [style.color]="'var(--color-text-dark)'">召標資訊</h3>
        <p [style.color]="'var(--color-text-dark)'">廠商召標資訊。</p>
        <button [style.background-color]="'var(--color-primary)'" [style.color]="'white'">提交報修</button>
      </div>
    </div>
  </section>
</div>
